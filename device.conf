# ═══════════════════════════════════════════════════════════════════════════════
# device.conf — device-specific KMI target (+ optional paths) for build.sh
#
# This is what makes the tool device-agnostic. build.sh sources this file at
# startup and REFUSES TO BUILD if MODULE_LAYOUT below is empty or not a valid CRC —
# set it for YOUR device first. (This repo ships it filled for the Itel RS4.)
# ═══════════════════════════════════════════════════════════════════════════════

# ── REQUIRED: your device's KMI `module_layout` CRC ────────────────────────────
# On a GKI device, the prebuilt vendor_dlkm modules only load against ONE exact
# kernel ABI, fingerprinted by this `module_layout` CRC. Build a kernel whose
# module_layout ≠ this and every vendor module refuses to load → the device boots
# nothing (no storage/display/radio). The build gate reproduces this value or dies.
#
#   This repo's device — Itel RS4 (S666LN / MT6789 / Helio G99) = 0x7c24b32d
#   ►► CHANGE IT for your device. ◄◄
#
# HOW TO OBTAIN YOURS — read it off the device's OWN stock vendor modules (that's
# the ABI your kernel must match). Any one vendor_dlkm .ko carries it:
#
#   # from a pulled stock vendor_dlkm/*.ko (needs kmod's modprobe):
#   modprobe --dump-modversions <any_vendor_module>.ko | awk '$2=="module_layout"{print $1}'
#
#   # or straight off the running stock kernel (rooted / adb):
#   grep -m1 '\bmodule_layout\b' /proc/kallsyms   # symbol addr, not the CRC — prefer the .ko method
#
#   # or, if you already built once, from the build's symvers:
#   awk '$2=="module_layout"{print $1}' .build/out-<variant>/vmlinux.symvers
#
# All the vendor .ko share the same module_layout CRC — grab it from any of them.
MODULE_LAYOUT="0x7c24b32d"

# ── OPTIONAL: stock vendor_dlkm .ko dir for the FULL CRC cross-check ────────────
# If set, the gate cross-checks every exported symbol the vendor modules reference
# (strongest guarantee — catches ABI breaks a matching module_layout alone can
# miss). If unset/missing, the gate does the module_layout check only, and warns.
# VENDOR_KO_DIR="/path/to/stock/vendor_dlkm"

# ── OPTIONAL: device/build paths ───────────────────────────────────────────────
# Leave unset to use build.sh's Itel-RS4 defaults, set here for your device, or
# override per-run with env vars (e.g. `KERNEL_SRC=/path ./build.sh vanilla`).
# KERNEL_SRC="/path/to/kernel-source"     # the kernel tree to build
# STOCK_CONFIG="/path/to/stock.config"    # base defconfig (must have CONFIG_CFI_CLANG=y)
# BOOT_IMG="/path/to/stock/boot.img"      # stock boot.img to repack (for --pack)
